<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aprendiendo Juntos</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* ── BLOQUEO TOTAL DE SELECCIÓN ── */
* {
  -webkit-user-select: none !important;
  -moz-user-select: none !important;
  -ms-user-select: none !important;
  user-select: none !important;
  -webkit-touch-callout: none !important;
  -webkit-tap-highlight-color: transparent !important;
}
:root {
  --cream: #FDF8F0;
  --text-dark: #4A3728;
  --text-mid: #7A6355;
  --shadow: 0 8px 32px rgba(74,55,40,0.12);
  --shadow-lg: 0 16px 48px rgba(74,55,40,0.16);
}
html, body {
  width: 100%; height: 100%;
  font-family: 'Baloo 2', cursive;
  background: var(--cream);
  color: var(--text-dark);
  overflow: hidden;
  touch-action: manipulation;
}

/* ═══════════════════════════════
   FLOATING BACKGROUND PARTICLES
═══════════════════════════════ */
#particles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(0) scale(1) rotate(0deg);   opacity: 0; }
  10%  { opacity: 0.55; }
  85%  { opacity: 0.4; }
  100% { transform: translateY(-110vh) scale(0.6) rotate(180deg); opacity: 0; }
}

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.screen {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  transition: opacity 0.55s cubic-bezier(.4,0,.2,1), transform 0.55s cubic-bezier(.4,0,.2,1);
  opacity: 0; pointer-events: none; transform: scale(0.94) translateY(12px);
}
.screen.active { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
.screen.exit    { opacity: 0; transform: scale(1.04) translateY(-10px); }

/* ═══════════════════════════════
   HOME
═══════════════════════════════ */
#home { gap: 20px; }

.home-deco {
  display: flex; gap: 12px; align-items: center;
  animation: homeDecoFloat 3s ease-in-out infinite;
}
@keyframes homeDecoFloat {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
.home-deco svg:nth-child(1) { animation: starSpin 6s linear infinite; transform-origin: center; }
.home-deco svg:nth-child(2) { animation: starSpin 8s linear infinite reverse; transform-origin: center; }
.home-deco svg:nth-child(3) { animation: starSpin 6s linear infinite; transform-origin: center; }
@keyframes starSpin { to { transform: rotate(360deg); } }

.home-title {
  font-size: clamp(1.9rem, 7.5vw, 3.2rem);
  font-weight: 800; color: var(--text-dark);
  text-align: center; line-height: 1.1;
  animation: fadeSlideUp 0.7s ease both;
}
.home-title span { display: block; font-size: 0.43em; font-weight: 600; color: var(--text-mid); margin-top: 8px; }
@keyframes fadeSlideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%; max-width: 360px;
}
/* last button (5th) spans full width and centers */
.menu-btn:last-child { grid-column: 1 / -1; width: calc(50% - 7px); justify-self: center; }
.menu-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px;
  aspect-ratio: 1 / 1;
  padding: 12px 8px; border: none; border-radius: 28px;
  cursor: pointer; font-family: 'Baloo 2', cursive;
  font-size: clamp(1rem, 4vw, 1.25rem); font-weight: 800;
  color: var(--text-dark); box-shadow: var(--shadow);
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  animation: fadeSlideUp 0.7s ease both;
  position: relative; overflow: hidden;
}
.menu-btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0); border-radius: inherit;
  transition: background 0.2s;
}
.menu-btn:hover { transform: scale(1.03) translateY(-2px); box-shadow: var(--shadow-lg); }
.menu-btn:active { transform: scale(0.96); }
.menu-btn:nth-child(1) { animation-delay: 0.1s; }
.menu-btn:nth-child(2) { animation-delay: 0.2s; }
.menu-btn:nth-child(3) { animation-delay: 0.3s; }
.menu-btn .icon { flex-shrink: 0; display: flex; align-items: center; transition: transform 0.3s; }
.menu-btn .icon svg { width: 58px; height: 58px; }
.menu-btn:hover .icon { transform: rotate(-8deg) scale(1.15); }
.menu-btn.nums  { background: #FDEBD0; }
.menu-btn.vocs  { background: #D5E8D4; }
.menu-btn.cols  { background: #DAE8FC; }
.menu-btn.anims { background: #FAE0F0; }
.menu-btn.shps  { background: #E8E0FA; }
.menu-btn:nth-child(4) { animation-delay: 0.4s; }
.menu-btn:nth-child(5) { animation-delay: 0.5s; }

/* ── GENERIC CARD for animals & shapes ── */
.gen-illus { margin-top: 6px; animation: illusFloat 0.5s 0.15s cubic-bezier(.34,1.56,.64,1) both; }
.shape-display { animation: illusFloat 0.5s cubic-bezier(.34,1.56,.64,1) both; }

/* ═══════════════════════════════
   SECTION SCREENS
═══════════════════════════════ */
.section-screen { gap: 0; padding: 0; justify-content: flex-start; }
.top-bar { width: 100%; display: flex; align-items: center; padding: 16px 22px 0; flex-shrink: 0; }
.back-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: none; background: rgba(74,55,40,0.09);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), background 0.2s;
  flex-shrink: 0;
}
.back-btn:hover { transform: scale(1.12); background: rgba(74,55,40,0.15); }
.back-btn:active { transform: scale(0.9); }
.section-title-bar {
  flex: 1; text-align: center;
  font-size: clamp(1.1rem, 4vw, 1.4rem);
  font-weight: 800; color: var(--text-mid); padding-right: 52px;
}

/* ═══════════════════════════════
   CARD
═══════════════════════════════ */
.card-area {
  flex: 1; width: 100%; display: flex;
  flex-direction: column; align-items: center;
  justify-content: center; padding: 12px 22px 0; overflow: hidden;
}
.big-card {
  background: white; border-radius: 40px; box-shadow: var(--shadow);
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 26px 24px 22px;
  cursor: pointer;
  position: relative; overflow: hidden;
  min-height: min(54vw, 305px); user-select: none;
  transition: box-shadow 0.3s;
}
.big-card:hover { box-shadow: var(--shadow-lg); }

/* card tap ripple */
.big-card::after {
  content:''; position:absolute;
  width:20px; height:20px; border-radius:50%;
  background: rgba(255,255,255,0.6);
  transform: scale(0); opacity:0;
  pointer-events:none;
  animation: none;
}
.big-card.rippling::after {
  animation: ripple 0.55s ease-out forwards;
}
@keyframes ripple {
  to { transform: scale(30); opacity: 0; }
}

/* card bounce */
.big-card.bounce { animation: cardBounce 0.5s cubic-bezier(.34,1.56,.64,1); }
@keyframes cardBounce {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.08) rotate(1deg); }
  65%  { transform: scale(0.97) rotate(-0.5deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* card slide in when changing item */
.big-card.slide-in-right { animation: slideInRight 0.38s cubic-bezier(.4,0,.2,1); }
.big-card.slide-in-left  { animation: slideInLeft  0.38s cubic-bezier(.4,0,.2,1); }
@keyframes slideInRight { from { opacity:0.4; transform: translateX(40px) scale(0.96); } to { opacity:1; transform: translateX(0) scale(1); } }
@keyframes slideInLeft  { from { opacity:0.4; transform: translateX(-40px) scale(0.96); } to { opacity:1; transform: translateX(0) scale(1); } }

.main-display {
  font-size: clamp(4.8rem, 19vw, 8rem);
  font-weight: 800; line-height: 1;
  transition: color 0.45s ease;
  animation: numPop 0.45s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes numPop { from { transform: scale(0.5) rotate(-10deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }

.main-label {
  font-size: clamp(1.2rem, 4.5vw, 1.9rem);
  font-weight: 800; margin-top: 7px;
  color: var(--text-mid); letter-spacing: 3px; text-transform: uppercase;
  animation: fadeSlideUp 0.4s 0.1s ease both;
}
.main-sub {
  font-size: clamp(0.88rem, 3vw, 1.1rem);
  font-weight: 600; color: #A08878; margin-top: 4px; font-style: italic;
  animation: fadeSlideUp 0.4s 0.18s ease both;
}
.illus {
  margin-top: 10px;
  animation: illusFloat 0.5s 0.15s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes illusFloat { from { transform: scale(0.6) translateY(14px); opacity:0; } to { transform: scale(1) translateY(0); opacity:1; } }

/* number objects */
.objs-grid { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 12px; max-width: 230px; }
.obj-item {
  animation: objPop 0.45s cubic-bezier(.34,1.56,.64,1) both;
  transition: transform 0.2s;
}
.obj-item:hover { transform: scale(1.15) rotate(5deg); }
@keyframes objPop { from { transform: scale(0) rotate(-20deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }

/* idle wiggle for objects */
.obj-item:nth-child(odd)  { animation-name: objPop, idleWiggle; animation-duration: 0.45s, 2.5s; animation-timing-function: cubic-bezier(.34,1.56,.64,1), ease-in-out; animation-fill-mode: both, none; animation-delay: var(--d,0s), calc(var(--d,0s) + 0.5s); animation-iteration-count: 1, infinite; }
.obj-item:nth-child(even) { animation-name: objPop, idleWiggle; animation-duration: 0.45s, 3s;   animation-timing-function: cubic-bezier(.34,1.56,.64,1), ease-in-out; animation-fill-mode: both, none; animation-delay: var(--d,0s), calc(var(--d,0s) + 0.8s); animation-iteration-count: 1, infinite; }
@keyframes idleWiggle { 0%,100%{transform:translateY(0) rotate(0);} 40%{transform:translateY(-6px) rotate(3deg);} 70%{transform:translateY(-3px) rotate(-2deg);} }

/* ═══════════════════════════════
   NAV — dots only, swipe zones handle navigation
═══════════════════════════════ */
.nav-row { display: flex; align-items: center; justify-content: center; padding: 12px 0 10px; flex-shrink: 0; }
.dots-row { display: flex; gap: 10px; align-items: center; }
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(74,55,40,0.16);
  transition: background 0.35s, transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
.dot.active { background: var(--text-dark); transform: scale(1.4); }

/* ── SWIPE ZONES (invisible tap areas on left/right) ── */
.swipe-zone {
  position: absolute; top: 0; bottom: 0; width: 28%;
  z-index: 10; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.swipe-zone-left  { left: 0; }
.swipe-zone-right { right: 0; }

/* Arrow hint that fades in on hover / touch */
.swipe-arrow {
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
}
.swipe-zone:hover .swipe-arrow,
.swipe-zone.pressing .swipe-arrow { opacity: 0.22; }
.swipe-zone.disabled { pointer-events: none; }
.swipe-zone.disabled .swipe-arrow { display: none; }

/* ═══════════════════════════════
   COLORS SECTION
═══════════════════════════════ */
.color-bg-overlay {
  position: absolute; inset: 0; border-radius: 40px;
  transition: background 0.65s ease; z-index: 0;
}
.color-circle {
  width: min(48vw, 200px); height: min(48vw, 200px);
  border-radius: 50%;
  box-shadow: 0 14px 44px rgba(0,0,0,0.16);
  transition: background 0.55s ease;
  position: relative; z-index: 1;
  animation: circleIn 0.5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes circleIn { from { transform: scale(0.5) rotate(-20deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }
/* idle pulse on color circle */
.color-circle { animation: circleIn 0.5s cubic-bezier(.34,1.56,.64,1), circlePulse 2.5s 0.6s ease-in-out infinite; }
@keyframes circlePulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

.color-name-label {
  font-size: clamp(1.7rem, 6.5vw, 2.8rem);
  font-weight: 800; margin-top: 14px;
  position: relative; z-index: 1;
  transition: color 0.45s ease;
  animation: fadeSlideUp 0.4s 0.15s ease both;
}

/* ═══════════════════════════════
   TAP HINT
═══════════════════════════════ */
.tap-hint {
  font-size: clamp(0.8rem, 2.8vw, 0.92rem);
  color: #BBA899; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  margin-top: 9px;
}
.tap-hint .hand { animation: handBounce 1.6s ease-in-out infinite; }
@keyframes handBounce { 0%,100%{transform:translateY(0) scale(1);} 40%{transform:translateY(-5px) scale(1.1);} 70%{transform:translateY(-2px) scale(1.05);} }

/* ═══════════════════════════════
   CONFETTI BURST
═══════════════════════════════ */
.confetti-piece {
  position: fixed; width: 12px; height: 12px;
  pointer-events: none; z-index: 999; border-radius: 2px;
  animation: confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--cx), var(--cy)) rotate(var(--cr)) scale(0.3); opacity: 0; }
}

/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media (max-height: 600px) {
  .big-card { min-height: 38vw; padding: 14px 20px 12px; }
  .nav-btn { width: 52px; height: 52px; }
  .nav-row { padding: 8px 0 6px; }
  .top-bar { padding-top: 10px; }
  .home-title { font-size: clamp(1.6rem, 6vw, 2.4rem); }
}
@media (min-width: 600px) { .card-area { padding: 16px 30px 0; } }
</style>
</head>
<body>

<!-- FLOATING PARTICLES CANVAS -->
<div id="particles"></div>

<!-- SVG SYMBOLS -->
<svg width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <symbol id="ico-left" viewBox="0 0 24 24">
      <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="ico-right" viewBox="0 0 24 24">
      <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="ico-back" viewBox="0 0 24 24">
      <path d="M19 12H5M5 12l6-6M5 12l6 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
  </defs>
</svg>

<!-- ═══════════════ HOME ═══════════════ -->
<div class="screen active" id="home">

  <div class="home-deco">
    <svg width="28" height="28" viewBox="0 0 30 30"><polygon points="15,2 18,10 27,10 20,16 23,25 15,19 7,25 10,16 3,10 12,10" fill="#F4C26A"/></svg>
    <svg width="40" height="40" viewBox="0 0 30 30"><polygon points="15,2 18,10 27,10 20,16 23,25 15,19 7,25 10,16 3,10 12,10" fill="#F4A460"/></svg>
    <svg width="28" height="28" viewBox="0 0 30 30"><polygon points="15,2 18,10 27,10 20,16 23,25 15,19 7,25 10,16 3,10 12,10" fill="#F4C26A"/></svg>
  </div>

  <div class="home-title">
    ¡Aprendiendo Juntos!
    <span>Toca para empezar</span>
  </div>

  <div class="menu-grid">
    <button class="menu-btn nums" onclick="openSection('numbers')">
      <span class="icon">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <rect x="3" y="7" width="40" height="30" rx="8" fill="#F4A460" opacity="0.3"/>
          <rect x="3" y="7" width="40" height="30" rx="8" stroke="#D4844A" stroke-width="1.5" fill="none"/>
          <rect x="10" y="38" width="6" height="3" rx="1.5" fill="#D4844A" opacity="0.5"/>
          <rect x="20" y="38" width="6" height="3" rx="1.5" fill="#D4844A" opacity="0.5"/>
          <text x="9" y="30" font-family="'Baloo 2',cursive" font-weight="800" font-size="18" fill="#C87840">1</text>
          <text x="19" y="30" font-family="'Baloo 2',cursive" font-weight="800" font-size="18" fill="#D49050">2</text>
          <text x="29" y="30" font-family="'Baloo 2',cursive" font-weight="800" font-size="18" fill="#C87840">3</text>
        </svg>
      </span>
      Números
    </button>

    <button class="menu-btn vocs" onclick="openSection('vowels')">
      <span class="icon">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <path d="M5 10 Q5 7 8 7 L22 7 L22 38 Q14 35 5 38 Z" fill="#A8D4A8" opacity="0.7"/>
          <path d="M41 10 Q41 7 38 7 L24 7 L24 38 Q32 35 41 38 Z" fill="#7ABE7A" opacity="0.7"/>
          <rect x="21" y="7" width="4" height="31" fill="#4A9A4A" opacity="0.4"/>
          <text x="9" y="30" font-family="'Baloo 2',cursive" font-weight="800" font-size="20" fill="#2A7A2A" opacity="0.9">A</text>
          <text x="26" y="20" font-family="'Baloo 2',cursive" font-weight="800" font-size="10" fill="#2A7A2A" opacity="0.8">EI</text>
          <text x="26" y="33" font-family="'Baloo 2',cursive" font-weight="800" font-size="10" fill="#2A7A2A" opacity="0.8">OU</text>
        </svg>
      </span>
      Vocales
    </button>

    <button class="menu-btn cols" onclick="openSection('colors')">
      <span class="icon">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="14" cy="16" r="9" fill="#E07070" opacity="0.75"/>
          <circle cx="32" cy="14" r="9" fill="#F0D060" opacity="0.75"/>

          <rect x="32" y="4" width="5" height="18" rx="2.5" fill="#D4A870" transform="rotate(30 32 4)"/>
          <path d="M38 22 Q41 26 38 30 Q35 26 38 22Z" fill="#E07070"/>
        </svg>
      </span>
      Colores
    </button>

    <button class="menu-btn anims" onclick="openSection('animals')">
      <span class="icon">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">

          <polygon points="34,16 38,6 28,14" fill="#F0B8D0"/>

          <!-- ojos -->
          <ellipse cx="18" cy="24" rx="3" ry="3.5" fill="#4A3728"/>
          <ellipse cx="28" cy="24" rx="3" ry="3.5" fill="#4A3728"/>
          <circle cx="19" cy="22.5" r="1.2" fill="white"/>
          <circle cx="29" cy="22.5" r="1.2" fill="white"/>
          <!-- nariz -->
          <ellipse cx="23" cy="29" rx="2" ry="1.5" fill="#E07090"/>
          <!-- bigotes -->
          <line x1="8" y1="28" x2="18" y2="30" stroke="#D090B0" stroke-width="1.2"/>
          <line x1="8" y1="32" x2="18" y2="31" stroke="#D090B0" stroke-width="1.2"/>
          <line x1="38" y1="28" x2="28" y2="30" stroke="#D090B0" stroke-width="1.2"/>
          <line x1="38" y1="32" x2="28" y2="31" stroke="#D090B0" stroke-width="1.2"/>
        </svg>
      </span>
      Animales
    </button>

    <button class="menu-btn shps" onclick="openSection('shapes')">
      <span class="icon">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="12" cy="12" r="8" fill="#A080C8" opacity="0.7"/>
          <rect x="26" y="4" width="16" height="16" rx="3" fill="#87AECE" opacity="0.7"/>
          <polygon points="23,28 7,42 39,42" fill="#87CEAB" opacity="0.7"/>
        </svg>
      </span>
      Formas
    </button>
  </div>
</div>

<!-- ═══════════════ NUMBERS ═══════════════ -->
<div class="screen section-screen" id="screen-numbers">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()" aria-label="Volver">
      <svg width="22" height="22"><use href="#ico-back"/></svg>
    </button>
    <div class="section-title-bar">Números</div>
  </div>
  <div class="card-area" style="position:relative;">
    <!-- swipe / tap zones -->

let currentSection = 'home';
let indexes = {numbers:0, vowels:0, colors:0, animals:0, shapes:0};
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
const PARTICLE_COLORS = ['#F4C26A','#F4A460','#87CEAB','#87AECE','#C9A0DC','#F0A0B8','#E07070','#B0D8A0'];
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 6 + Math.random() * 14;
    const color = PARTICLE_COLORS[Math.floor(Math.random()*PARTICLE_COLORS.length)];
    const left  = Math.random() * 100;
    const delay = Math.random() * 12;
    const dur   = 10 + Math.random() * 14;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%; bottom:-${size}px;
      background:${color}; opacity:0;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    container.appendChild(el);
  }
}
createParticles();

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function openSection(sec) {
  playMenuSound();
  const home = document.getElementById('home');
  home.classList.remove('active');
  setTimeout(() => {
    const scr = document.getElementById('screen-'+sec);
    scr.classList.add('active');
  }, 60);
  currentSection = sec;
  indexes[sec] = 0;
  setTimeout(() => { renderSection(sec, 'none'); speakCurrent(); }, 150);
}

function goHome() {
  playBackSound();
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  setTimeout(() => document.getElementById('home').classList.add('active'), 60);
  currentSection = 'home';
}

function navItem(sec, dir) {
  const data = getDataFor(sec);
  const idx  = indexes[sec] + dir;
  if (idx < 0 || idx >= data.length) return;
  indexes[sec] = idx;
  playNavSound(dir);
  renderSection(sec, dir > 0 ? 'right' : 'left');
  setTimeout(() => speakCurrent(), 180);
}

function getDataFor(sec) {
  if (sec==='numbers') return NUMBERS;
  if (sec==='vowels')  return VOWELS;
  if (sec==='animals') return ANIMALS;
  if (sec==='shapes')  return SHAPES;
  return COLORS;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderSection(sec, dir) {
  if (sec==='numbers') renderNumbers(dir);
  else if (sec==='vowels')  renderVowels(dir);
  else if (sec==='colors')  renderColors(dir);
  else if (sec==='animals') renderAnimals(dir);
  else if (sec==='shapes')  renderShapes(dir);
  updateDots(sec);
  updateNavBtns(sec);
}

function triggerCardAnim(cardId, dir) {
  const el = document.getElementById(cardId);
  el.classList.remove('slide-in-right','slide-in-left','bounce');
  void el.offsetWidth;
  if (dir==='right') el.classList.add('slide-in-right');
  else if (dir==='left') el.classList.add('slide-in-left');
  else el.classList.add('bounce');
}

function renderNumbers(dir='none') {
  const d   = NUMBERS[indexes.numbers];
  const idx = indexes.numbers;
  // re-trigger CSS animations on text
  const disp  = document.getElementById('num-display');
  const label = document.getElementById('num-label');
  [disp,label].forEach(el => { el.style.animation='none'; void el.offsetWidth; el.style.animation=''; });
  disp.textContent = d.n;
  disp.style.color = d.color;
  label.textContent = d.label;

  const grid = document.getElementById('num-objs');
  grid.innerHTML = '';
  const size   = d.n<=3?54:44;
  const maker  = OBJ_MAKERS[idx];
  for (let i=0;i<d.n;i++) {
    const w = document.createElement('div');
    w.className = 'obj-item';
    w.style.setProperty('--d', (i*0.1)+'s');
    w.innerHTML = maker(d.color, size);
    grid.appendChild(w);
  }
  triggerCardAnim('num-card', dir);
}

function renderVowels(dir='none') {
  const d = VOWELS[indexes.vowels];
  const disp  = document.getElementById('vow-display');
  const label = document.getElementById('vow-label');
  const illus = document.getElementById('vow-illus');
  const word  = document.getElementById('vow-word');
  [disp,label,illus,word].forEach(el => { el.style.animation='none'; void el.offsetWidth; el.style.animation=''; });
  disp.textContent  = d.upper;
  disp.style.color  = d.color;
  label.textContent = d.lower;
  word.textContent  = d.word;
  illus.innerHTML   = vowelSVGs[d.svgId]||'';
  triggerCardAnim('vow-card', dir);
}

function renderColors(dir='none') {
  const d = COLORS[indexes.colors];
  const circle  = document.getElementById('col-circle');
  const nameEl  = document.getElementById('col-name');
  const overlay = document.getElementById('col-overlay');
  // re-trigger circle anim
  circle.style.animation='none'; void circle.offsetWidth;
  circle.style.animation='circleIn 0.5s cubic-bezier(.34,1.56,.64,1), circlePulse 2.5s 0.6s ease-in-out infinite';
  nameEl.style.animation='none'; void nameEl.offsetWidth; nameEl.style.animation='';
  circle.style.background  = d.hex;
  nameEl.textContent        = d.name;
  nameEl.style.color        = d.text;
  overlay.style.background  = d.bg;
  triggerCardAnim('col-card', dir);
}

function renderAnimals(dir='none') {
  const d = ANIMALS[indexes.animals];
  const illus = document.getElementById('ani-illus');
  const label = document.getElementById('ani-label');
  illus.style.animation='none'; void illus.offsetWidth; illus.style.animation='';
  label.style.animation='none'; void label.offsetWidth; label.style.animation='';
  illus.innerHTML = animalSVGs[d.svgId] || '';
  label.textContent = d.label;
  label.style.color = d.color;
  triggerCardAnim('ani-card', dir);
}

function renderShapes(dir='none') {
  const d = SHAPES[indexes.shapes];
  const illus = document.getElementById('shp-illus');
  const label = document.getElementById('shp-label');
  illus.style.animation='none'; void illus.offsetWidth; illus.style.animation='';
  label.style.animation='none'; void label.offsetWidth; label.style.animation='';
  illus.innerHTML = shapeSVGs[d.svgId] || '';
  label.textContent = d.label;
  label.style.color = d.color;
  triggerCardAnim('shp-card', dir);
}

function updateDots(sec) {
  const data  = getDataFor(sec);
  const rowMap = {numbers:'num-dots-row',vowels:'vow-dots-row',colors:'col-dots-row',animals:'ani-dots-row',shapes:'shp-dots-row'};
  const row = document.getElementById(rowMap[sec]);
  if (!row) return;
  row.innerHTML='';
  data.forEach((_,i)=>{
    const dot=document.createElement('div');
    dot.className='dot'+(i===indexes[sec]?' active':'');
    row.appendChild(dot);
  });
}
function updateNavBtns(sec) {
  const data = getDataFor(sec); const idx = indexes[sec];
  const pMap = {numbers:'num',vowels:'vow',colors:'col',animals:'ani',shapes:'shp'};
  const p = pMap[sec];
  const zL = document.getElementById(p+'-zone-left');
  const zR = document.getElementById(p+'-zone-right');
  if (zL) zL.classList.toggle('disabled', idx===0);
  if (zR) zR.classList.toggle('disabled', idx===data.length-1);
}

/* ── TOUCH SWIPE SUPPORT ── */
(function() {
  let startX = 0, startY = 0, startSec = null;
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startSec = currentSection;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if (!startSec || startSec === 'home') return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // only horizontal swipes with enough distance and not mostly vertical
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
      navItem(startSec, dx < 0 ? 1 : -1);
    }
  }, {passive:true});
})();

/* ═══════════════════════════════════════════
   CARD TAP — ripple + confetti + speak
═══════════════════════════════════════════ */
function onCardTap(sec, event) {
  const cardMap = {numbers:'num-card',vowels:'vow-card',colors:'col-card',animals:'ani-card',shapes:'shp-card'};
  const card = document.getElementById(cardMap[sec]);
  card.classList.remove('rippling');
  void card.offsetWidth;
  card.classList.add('rippling');
  confettiBurst(event.clientX, event.clientY);
  speakCurrent();
}

function confettiBurst(cx, cy) {
  const colors=['#F4C26A','#F4A460','#87CEAB','#87AECE','#C9A0DC','#F0A0B8','#E07070','#70C070'];
  for (let i=0;i<14;i++) {
    const el  = document.createElement('div');
    el.className='confetti-piece';
    const angle = (i/14)*360;
    const dist  = 60+Math.random()*80;
    const rad   = (angle*Math.PI)/180;
    const vx    = Math.cos(rad)*dist;
    const vy    = Math.sin(rad)*dist - 40;
    const rot   = (Math.random()-0.5)*720+'deg';
    el.style.cssText=`
      left:${cx}px; top:${cy}px;
      background:${colors[i%colors.length]};
      --cx:${vx}px; --cy:${vy}px; --cr:${rot};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      width:${8+Math.random()*8}px;
      height:${8+Math.random()*8}px;
      animation-duration:${0.9+Math.random()*0.5}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

/* ═══════════════════════════════════════════
   SPEECH
═══════════════════════════════════════════ */
function speakCurrent() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  let text = '';
  if (currentSection==='numbers') text=NUMBERS[indexes.numbers].speech;
  else if (currentSection==='vowels')  text=VOWELS[indexes.vowels].speech;
  else if (currentSection==='colors')  text=COLORS[indexes.colors].speech;
  else if (currentSection==='animals') text=ANIMALS[indexes.animals].speech;
  else if (currentSection==='shapes')  text=SHAPES[indexes.shapes].speech;
  if (!text) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang='es-ES'; utter.rate=0.72; utter.pitch=1.15; utter.volume=1;
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang.startsWith('es'))||null;
  if (esVoice) utter.voice=esVoice;
  window.speechSynthesis.speak(utter);
}
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

   SOUNDS — Web Audio, baby-friendly

// Helper: fade out a gain node
function fadeOut(gain, ctx, dur) {
  gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
}

// Soft xylophone note
function playNote(freq, delay=0, dur=0.5, vol=0.18) {
  try {
    const ctx = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, ctx.currentTime+delay);
    gain.gain.setValueAtTime(0, ctx.currentTime+delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+delay+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay);
    osc.stop(ctx.currentTime+delay+dur+0.05);
  } catch(e){}
}

// Happy sparkle: ascending arpeggio
function playMenuSound() {
  const notes=[523,659,784,1047]; // C5 E5 G5 C6
  notes.forEach((f,i)=>playNote(f, i*0.10, 0.38, 0.15));
}

// Gentle back sound: descending 2 notes
function playBackSound() {
  playNote(523,0,0.3,0.12);
  playNote(392,0.12,0.35,0.10);
}

// Navigation click: soft "boing"
function playNavSound(dir) {
  const freq = dir>0 ? 660 : 523;
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*1.25, ctx.currentTime+0.06);
    osc.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime+0.2);
    gain.gain.setValueAtTime(0.14, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.28);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.32);
  } catch(e){}
}

// Celebrate melody: happy 5-note fanfare
function playCelebrate() {
  const notes=[523,587,659,784,1047];
  notes.forEach((f,i)=>playNote(f, i*0.11, 0.4, 0.14));
  // little shimmer
  setTimeout(()=>{
    [1047,1319,1568].forEach((f,i)=>playNote(f,i*0.07,0.3,0.10));
  }, 600);
}

// Gentle lullaby chime on card tap
function playTapChime(sec) {
  const scales = {
    numbers: [523,659,784],
    vowels:  [587,740,880],
    colors:  [622,784,932],
    animals: [554,698,831],
    shapes:  [494,622,740],
  };
  const notes = scales[sec] || scales.numbers;
  notes.forEach((f,i)=>playNote(f, i*0.08, 0.45, 0.13));
}

/* override onCardTap to add chime */
const _onCardTap = onCardTap;
window.onCardTap = function(sec, event) {
  playTapChime(sec);
  _onCardTap(sec, event);
};

/* play sound on openSection too */
const _openSection = openSection;
window.openSection = function(sec) {
  _openSection(sec);
};

/* ─── Celebrate when reaching last item ─── */
let lastIndexes = {numbers:-1, vowels:-1, colors:-1, animals:-1, shapes:-1};
const _navItem = navItem;
window.navItem = function(sec, dir) {
  _navItem(sec, dir);
  const data = getDataFor(sec);
  if (indexes[sec]===data.length-1 && lastIndexes[sec]!==data.length-1) {
    setTimeout(()=>playCelebrate(), 300);
  }
  lastIndexes[sec]=indexes[sec];
};

// init first render
renderSection('numbers','none');
renderSection('vowels','none');
renderSection('colors','none');
renderSection('animals','none');
renderSection('shapes','none');
